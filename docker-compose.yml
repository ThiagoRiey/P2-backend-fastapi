version: '3.8'

services:
  db_dev:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=ecommerce_dev
    ports:
      - "5434:5432"
    volumes:
      - dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=ecommerce_test
    ports:
      - "5435:5432" # <-- Mudamos para 5435 para garantir que fique livre
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce_test"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  dev_data: